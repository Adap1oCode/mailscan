services:
  mailscan:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      MAILSCAN_API_KEY: ${MAILSCAN_API_KEY}
      TESSERACT_CMD: /usr/bin/tesseract
      REDIS_URL: redis://redis:6379/0
      ADDRESS_PARSER: ${ADDRESS_PARSER:-regex}
      PORT: ${PORT:-8000}
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      MAILSCAN_API_KEY: ${MAILSCAN_API_KEY}
      TESSERACT_CMD: /usr/bin/tesseract
      REDIS_URL: redis://redis:6379/0
      ADDRESS_PARSER: ${ADDRESS_PARSER:-regex}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
