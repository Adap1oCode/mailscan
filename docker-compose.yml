services:
  mailscan:
    build: .
    ports:
      - "8000:8000"
    environment:
      MAILSCAN_API_KEY: ${MAILSCAN_API_KEY}
      TESSERACT_CMD: /usr/bin/tesseract
      PORT: 8000
    volumes:
      # Mount app/ for live reload during dev — remove in production
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
